# These settings were set by the catalyst build script that automatically
# built this stage.
# Please consult /usr/share/portage/config/make.conf.example for a more
# detailed example.
COMMON_FLAGS="-O3 -pipe -march=native -flto"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# NOTE: This stage was built with the bindist USE flag enabled

# This sets the language of build output to English.
# Please keep this setting intact when reporting bugs.
LC_MESSAGES=C.UTF-8
USE="btrfs wayland threads alsa basu sdl sdl-image ssh python io-uring nls opengl icu lto pgo lm-sensors vulkan sensors jemalloc gstreamer dbus qt6 udev ffmpeg X x264 x265 avif jpeg2k vpx sixel webp jpegxl png jpeg vorbis flac ogg opus mp3 fftw fontconfig hdri heif lcms lzma perl raw tiff truetype xml zip zlib dist-kernel dracut -jack -pipewire -pulseaudio -systemd -elogind -gtk -gtk+"
ACCEPT_LICENSE="-* @FREE"
ACCEPT_KEYWORDS="~amd64"
MAKEOPTS="-j8 -l8.0"
FEATURES="candy"
PORTAGE_COMPPRESS="zstd"
BINPKG_FORMAT="gpkg"
AMDGPU_TARGETS=""
INPUT_DEVICES="evdev libinput"
VIDEO_CARDS="radeon radeonsi amdgpu fbdev"
EGIT_CLONE_TYPE="shallow"
LUA_SINGLE_TARGET="luajit"
MICROCODE_SIGNATURES="-s 0x000406f1"
